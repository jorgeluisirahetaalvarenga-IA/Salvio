version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: salvio_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootroot
      MYSQL_DATABASE: salvio_tenant_template
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  valkey:
    image: valkey/valkey:7.2-alpine
    container_name: salvio_valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data

volumes:
  mysql_data:
  valkey_data:
